spring.application.name=project

# Base path for all endpoints: e.g. POST http://localhost:8080/project/api/trades
server.servlet.context-path=/project

# PostgreSQL (adjust URL, username, password for your environment)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/allocation
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

server.port=8080

# to enable logs for specific packages
# spring.log.level.com.allocation.trade=DEBUG
# spring.log.level.com.allocation.trade.service=INFO
# spring.log.level.com.allocation.trade.repository=ERROR
# spring.log.level.com.allocation.trade.exception=WARN
# spring.log.level.com.allocation.trade.controller=TRACE
# spring.log.level.com.allocation.trade.mapper=DEBUG
# spring.log.level.com.allocation.trade.entity=INFO
# spring.log.level.com.allocation.trade.dto=DEBUG

# For first-time schema creation from entities, you can use ddl-auto=update once, then switch back to validate.
# Your trades table should use a BIGSERIAL or IDENTITY id column for JPA @GeneratedValue(IDENTITY), for example:
#   id BIGSERIAL PRIMARY KEY
# or: id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY
